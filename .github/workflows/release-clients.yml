name: Release Clients

on:
  push:
    tags:
      - 'client-v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#client-v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Generate gRPC code
        run: buf generate "https://github.com/zitadel/zitadel.git#ref=v${{ steps.version.outputs.VERSION }},depth=1" --include-imports --path ./proto/zitadel

      - name: Restore
        run: dotnet restore src/Zitadel.Clients/Zitadel.Clients.csproj

      - name: Build
        run: dotnet build src/Zitadel.Clients/Zitadel.Clients.csproj --no-restore -c Release

      - name: Pack
        run: dotnet pack src/Zitadel.Clients/Zitadel.Clients.csproj --no-build -c Release -o ./nupkgs /p:Version=${{ steps.version.outputs.VERSION }}
          
      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkgs/*.nupkg